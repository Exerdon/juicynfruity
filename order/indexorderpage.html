<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoothie Order</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.section{
    margin-bottom:25px;
}

.section h3{
    margin-bottom:15px;
    color:#333;
}

label{
    display:block;
    margin-bottom:14px;
    font-size:18px;
    cursor:pointer;
}

input[type="text"]{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:white;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    background:#1ebe5d;
}

.location-box{
    background:#f1f1f1;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:14px;
    word-break:break-word;
}

.total-box{
    background:#fff3cd;
    border:1px solid #ffe69c;
    padding:15px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

.price{
    color:#1e8e3e;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Smoothie Order</h2>

<!-- NAME -->
<div class="section">

<h3>Your Name</h3>

<input type="text"
id="name"
placeholder="Enter your name">

</div>


<!-- DRINKS -->
<div class="section">

<h3>Select Your Drink</h3>

<label>
<input type="radio"
name="drink"
value="Mango Shake"
data-price="70">

Mango Shake
<span class="price">- Rs. 70.00</span>
</label>


<label>
<input type="radio"
name="drink"
value="Banana Shake"
data-price="55">

Banana Shake
<span class="price">- Rs. 55.00</span>
</label>


<label>
<input type="radio"
name="drink"
value="Cold Coffee"
data-price="70">

Cold Coffee
<span class="price">- Rs. 70.00</span>
</label>


<label>
<input type="radio"
name="drink"
value="Papaya Shake"
data-price="60">

Papaya Shake
<span class="price">- Rs. 60.00</span>
</label>


<label>
<input type="radio"
name="drink"
value="Banana Chocolate Shake"
data-price="70">

Banana Chocolate Shake
<span class="price">- Rs. 70.00</span>
</label>


<label>
<input type="radio"
name="drink"
value="Pudina Aam Panna"
data-price="25">

Pudina Aam Panna
<span class="price">- Rs. 25.00</span>
</label>

</div>



<!-- TOPPINGS -->
<div class="section">

<h3>Select Any 2 Toppings</h3>

<label>
<input type="checkbox"
class="topping"
value="Chia Seeds"
data-price="3">

Chia Seeds
<span class="price">+ Rs 3.00</span>
</label>


<label>
<input type="checkbox"
class="topping"
value="Coconut"
data-price="0">

Coconut
<span class="price">+ Rs 0.00</span>
</label>


<label>
<input type="checkbox"
class="topping"
value="Choco Chips"
data-price="2">

Choco Chips
<span class="price">+ Rs 2.00</span>
</label>


<label>
<input type="checkbox"
class="topping"
value="Tuty Fruity"
data-price="0">

Tuty Fruity
<span class="price">+ Rs 0.00</span>
</label>


<label>
<input type="checkbox"
class="topping"
value="Ice Cream"
data-price="10">

Ice Cream
<span class="price">+ Rs 10.00</span>
</label>

</div>



<!-- OPTIONS -->
<div class="section">

<h3>Add Options</h3>

<label>
<input type="checkbox" id="sugar">
Sugar
</label>

<label>
<input type="checkbox" id="ice">
Ice
</label>

</div>



<!-- LOCATION -->
<div class="section">

<h3>Location</h3>

<button type="button"
onclick="getLocation()">

Fetch Current Location

</button>

<div id="locationDisplay"
class="location-box">

Location not fetched

</div>

</div>



<!-- TOTAL -->
<div class="section">

<div class="total-box">

Total: Rs.
<span id="totalAmount">0</span>

</div>

</div>



<!-- ORDER BUTTON -->
<button onclick="placeOrder()">

Place Order

</button>

</div>



<script>

let locationLink = "";



// LIMIT TOPPINGS TO 2
const toppingCheckboxes =
document.querySelectorAll(".topping");

toppingCheckboxes.forEach((checkbox)=>{

checkbox.addEventListener("change",()=>{

let checked =
document.querySelectorAll(
".topping:checked"
);

if(checked.length > 2){

checkbox.checked = false;

alert(
"You can select only 2 toppings."
);

}

updateTotal();

});

});



// UPDATE TOTAL
function updateTotal(){

let total = 0;


// Drink Price
let selectedDrink =
document.querySelector(
'input[name="drink"]:checked'
);

if(selectedDrink){

total += Number(
selectedDrink.dataset.price
);

}


// Topping Prices
document.querySelectorAll(
'.topping:checked'
).forEach((item)=>{

total += Number(
item.dataset.price
);

});


document.getElementById(
"totalAmount"
).innerText = total;

}



// RADIO BUTTON CHANGE
document.querySelectorAll(
'input[name="drink"]'
).forEach((radio)=>{

radio.addEventListener(
"change",
updateTotal
);

});




// FETCH LOCATION
function getLocation(){

if(!navigator.geolocation){

alert(
"Geolocation not supported."
);

return;
}


navigator.geolocation.getCurrentPosition(

function(position){

let lat =
position.coords.latitude;

let lng =
position.coords.longitude;

locationLink =
`https://maps.google.com/?q=${lat},${lng}`;

document.getElementById(
"locationDisplay"
).innerHTML =
"Location fetched successfully";

},

function(error){

alert(
"Please allow location permission."
);

}

);

}




// PLACE ORDER
function placeOrder(){

let name =
document.getElementById(
"name"
).value;

if(!name){

alert("Please enter your name");

return;
}


let drink =
document.querySelector(
'input[name="drink"]:checked'
);

if(!drink){

alert("Please select a drink");

return;
}



// TOPPINGS
let toppings = [];

document.querySelectorAll(
'.topping:checked'
).forEach((item)=>{

toppings.push(item.value);

});



// OPTIONS
let sugar =
document.getElementById(
"sugar"
).checked;

let ice =
document.getElementById(
"ice"
).checked;



// FINAL MESSAGE
let message =

`Smoothies order from ${name}

${drink.value} with ${toppings.join(", ")}

Ice: ${ice}
Sugar: ${sugar}

Location:
${locationLink}`;



let encodedMessage =
encodeURIComponent(message);



let whatsappLink =

`https://wa.me/919045469325?text=${encodedMessage}`;



window.location.href =
whatsappLink;

}

</script>

</body>
</html>
